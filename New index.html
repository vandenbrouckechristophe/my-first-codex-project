<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Mijn eerste website</title>
    <style>
        /* Zorg dat body de hele viewport vult en inhoud centreert */
        body {
            background-color: #3498db; /* blauwe achtergrond */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            flex-direction: column; /* zodat knop en tekst onder elkaar staan */
            color: white;
        }

        /* Styling van de knop */
        button {
            padding: 20px 40px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background-color: #2c3e50;
            color: white;
        }

        button:hover {
            background-color: #1abc9c;
        }

        /* Bericht onder de knop */
        #bericht {
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <button onclick="zegWelkom()">Klik hier</button>
    <p id="bericht"></p>

    <script>
        function zegWelkom() {
            document.getElementById("bericht").innerText = "Welkom!";
        }
    </script>

</body>
</html>
